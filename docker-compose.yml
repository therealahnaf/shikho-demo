name: ${COMPOSE_PROJECT_NAME:-studycircle}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_ORIGIN: ${FRONTEND_PUBLIC_URL}
      DISPLAY_TIMEZONE: Asia/Dhaka
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_LOCAL_PORT:-8000}:8000"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${BACKEND_PUBLIC_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_LOCAL_PORT:-8080}:80"
    networks:
      - internal

  cloudflared-backend:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_BACKEND_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  cloudflared-frontend:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_FRONTEND_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres-data:

networks:
  internal:
    driver: bridge
